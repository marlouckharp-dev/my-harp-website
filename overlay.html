<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Overlay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'Segoe UI', sans-serif;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
        }

        /* ============================================
           NAME/LOGO — TOP LEFT
           ============================================ */

        .stream-logo {
            position: fixed;
            top: 30px;
            left: 30px;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: linear-gradient(135deg, #ff7c5c, #ff8fab);
            border-radius: 50px;
            padding: 0.6rem 1.4rem;
            box-shadow: 0 4px 20px rgba(255, 124, 92, 0.4);
            animation: fadeInDown 0.8s ease forwards;
        }

        @keyframes fadeInDown {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .stream-logo-name {
            font-family: 'Segoe UI', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            letter-spacing: 0.05em;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .stream-logo-emoji {
            font-size: 1.4rem;
        }

        .stream-logo-tagline {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.85);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 0.1rem;
        }

        .songs-container {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 380px;
        }

        .song-card {
            background: linear-gradient(135deg, #ff7c5c, #ff8fab);
            border-radius: 16px;
            padding: 1rem 1.2rem;
            margin-bottom: 0.5rem;
            box-shadow: 0 4px 20px rgba(255, 124, 92, 0.4);
            transform: translateX(-450px);
            opacity: 0;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
                        opacity 0.5s ease;
        }

        .song-card.visible {
            transform: translateX(0);
            opacity: 1;
        }

        .song-card.next-card {
            background: linear-gradient(135deg, #ff8fab, #ffaa8a);
            box-shadow: 0 4px 20px rgba(255, 143, 171, 0.4);
            transition-delay: 0.1s;
        }

        .card-label {
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 0.3rem;
        }

        .song-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-artist {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-requester {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            font-style: italic;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .no-requests {
            background: rgba(255, 124, 92, 0.85);
            border-radius: 16px;
            padding: 0.8rem 1.2rem;
            transform: translateX(-450px);
            opacity: 0;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
                        opacity 0.5s ease;
        }

        .no-requests.visible {
            transform: translateX(0);
            opacity: 1;
        }

        .no-requests p {
            font-size: 0.85rem;
            color: white;
            font-weight: 600;
        }

        /* ============================================
           KO-FI ALERT — CENTER SCREEN
           ============================================ */

        .kofi-alert {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 500px;
            background: linear-gradient(135deg, #ff7c5c, #ffcc66);
            border-radius: 24px;
            padding: 2rem 2.5rem;
            text-align: center;
            box-shadow: 0 8px 40px rgba(255, 124, 92, 0.6);
            opacity: 0;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
                        opacity 0.4s ease;
            z-index: 999;
        }

        .kofi-alert.visible {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .kofi-alert-emoji {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 0.5rem;
            animation: bounce 0.6s ease infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        .kofi-alert-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.3rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .kofi-alert-amount {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .kofi-alert-message {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.9);
            font-style: italic;
            margin-top: 0.5rem;
        }

        .kofi-alert-name {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.95);
            font-weight: 600;
        }

        /* ============================================
           GOAL OVERLAY — BOTTOM RIGHT
           ============================================ */

        .goal-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 340px;
            transform: translateX(400px);
            opacity: 0;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
                        opacity 0.5s ease;
        }

        .goal-container.visible {
            transform: translateX(0);
            opacity: 1;
        }

        .goal-card {
            background: linear-gradient(135deg, #ff7c5c, #ffaa8a);
            border-radius: 16px;
            padding: 1rem 1.2rem;
            box-shadow: 0 4px 20px rgba(255, 124, 92, 0.4);
        }

        .goal-label {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 0.4rem;
        }

        .goal-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.6rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .goal-bar-bg {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            height: 12px;
            margin-bottom: 0.4rem;
            overflow: hidden;
        }

        .goal-bar-fill {
            height: 100%;
            background: white;
            border-radius: 20px;
            transition: width 1s ease;
        }

        .goal-amounts {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .goal-current {
            font-size: 0.85rem;
            font-weight: 700;
            color: white;
        }

        .goal-target {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.75);
        }

        .goal-percent {
            font-size: 0.75rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
        }

        .kofi-link {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.75);
            text-align: center;
            margin-top: 0.4rem;
            display: block;
        }
    </style>
</head>
<body>
    
    <!-- Name/Logo — Top Left -->
    <div class="stream-logo">
        <span class="stream-logo-emoji">🎵</span>
        <div>
            <div class="stream-logo-name">Marlou Ck</div>
            <div class="stream-logo-tagline">🍫 Harpist · 🪰 Scientist · 🎮 Gamer</div>
        </div>
    </div>

    <!-- Song Overlay — Bottom Left -->
    <div class="songs-container">
        <div class="song-card" id="current-card">
            <p class="card-label">🎵 Now Playing</p>
            <p class="song-title" id="current-title">—</p>
            <p class="song-artist" id="current-artist">—</p>
            <p class="song-requester" id="current-requester"></p>
        </div>
        <div class="song-card next-card" id="next-card">
            <p class="card-label">⏭️ Up Next</p>
            <p class="song-title" id="next-title">—</p>
            <p class="song-artist" id="next-artist">—</p>
            <p class="song-requester" id="next-requester"></p>
        </div>
        <div class="no-requests" id="no-requests">
            <p>🎵 No requests yet — visit marlouck.com/live!</p>
        </div>
    </div>

    <!-- Ko-fi Alert — Center Screen -->
    <div class="kofi-alert" id="kofi-alert">
        <span class="kofi-alert-emoji">☕</span>
        <p class="kofi-alert-title">Thank you!</p>
        <p class="kofi-alert-name" id="kofi-alert-name">Someone</p>
        <p class="kofi-alert-amount" id="kofi-alert-amount">€0</p>
        <p class="kofi-alert-message" id="kofi-alert-message"></p>
    </div>

    <!-- Goal Overlay — Bottom Right -->
    <div class="goal-container" id="goal-container">
        <div class="goal-card">
            <p class="goal-label">☕ Ko-fi Goal</p>
            <p class="goal-title" id="goal-title">Loading...</p>
            <div class="goal-bar-bg">
                <div class="goal-bar-fill" id="goal-bar" style="width: 0%"></div>
            </div>
            <div class="goal-amounts">
                <span class="goal-current" id="goal-current">€0</span>
                <span class="goal-percent" id="goal-percent">0%</span>
                <span class="goal-target" id="goal-target">of €0</span>
            </div>
            <span class="kofi-link">Support at ko-fi.com/marlouck_harp ☕</span>
        </div>
    </div>

    <script>
        var API = 'https://api.marlouck.com';
        var params = new URLSearchParams(window.location.search);
        var SECRET = params.get('secret') || '';

        // ============================================
        // SONG REQUESTS
        // ============================================

        var currentCard = document.getElementById('current-card');
        var nextCard = document.getElementById('next-card');
        var noRequests = document.getElementById('no-requests');

        function hideSongs() {
            currentCard.classList.remove('visible');
            nextCard.classList.remove('visible');
            noRequests.classList.remove('visible');
        }

        function updateSongs() {
            fetch(API + '/api/requests?secret=' + SECRET)
                .then(function(res) { return res.json(); })
                .then(function(requests) {
                    hideSongs();

                    if (!requests.length) {
                        setTimeout(function() {
                            noRequests.classList.add('visible');
                        }, 100);
                        return;
                    }

                    var current = requests[0];
                    document.getElementById('current-title').textContent =
                        current.song_title;
                    document.getElementById('current-artist').textContent =
                        'by ' + current.song_artist;
                    document.getElementById('current-requester').textContent =
                        'Requested by ' + current.requester_name +
                        (current.message ? ' · "' + current.message + '"' : '');

                    setTimeout(function() {
                        currentCard.classList.add('visible');
                    }, 100);

                    if (requests.length > 1) {
                        var next = requests[1];
                        document.getElementById('next-title').textContent =
                            next.song_title;
                        document.getElementById('next-artist').textContent =
                            'by ' + next.song_artist;
                        document.getElementById('next-requester').textContent =
                            'Requested by ' + next.requester_name;
                        setTimeout(function() {
                            nextCard.classList.add('visible');
                        }, 200);
                    }
                })
                .catch(function() {
                    console.log('Could not fetch requests');
                });
        }

        // ============================================
        // KO-FI ALERTS
        // ============================================

        var shownAlerts = [];

        function checkKofiAlerts() {
            fetch(API + '/api/kofi/alerts')
                .then(function(res) { return res.json(); })
                .then(function(alerts) {
                    alerts.forEach(function(alert) {
                        if (shownAlerts.indexOf(alert.id) !== -1) return;
                        shownAlerts.push(alert.id);
                        showKofiAlert(alert);
                    });
                })
                .catch(function() {});
        }

        function showKofiAlert(alert) {
            var el = document.getElementById('kofi-alert');
            var emoji = alert.type === 'Subscription' ? '⭐' :
                        alert.type === 'Shop Order' ? '🛒' : '☕';

            el.querySelector('.kofi-alert-emoji').textContent = emoji;
            document.getElementById('kofi-alert-name').textContent =
                alert.name + ' just supported!';
            document.getElementById('kofi-alert-amount').textContent =
                alert.currency + ' ' + alert.amount;
            document.getElementById('kofi-alert-message').textContent =
                alert.message ? '"' + alert.message + '"' : '';

            el.classList.add('visible');

            setTimeout(function() {
                el.classList.remove('visible');
            }, 6000);
        }

        checkKofiAlerts();
        setInterval(checkKofiAlerts, 5000);

        // ============================================
        // KO-FI GOAL
        // ============================================

        function updateGoal() {
            fetch(API + '/api/goal')
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    var percent = Math.min(
                        Math.round((data.current / data.target) * 100), 100
                    );

                    document.getElementById('goal-title').textContent = data.title;
                    document.getElementById('goal-current').textContent =
                        '€' + data.current;
                    document.getElementById('goal-target').textContent =
                        'of €' + data.target;
                    document.getElementById('goal-percent').textContent =
                        percent + '%';

                    setTimeout(function() {
                        document.getElementById('goal-bar').style.width = percent + '%';
                    }, 300);

                    document.getElementById('goal-container').classList.add('visible');
                })
                .catch(function() {
                    console.log('Could not fetch goal');
                });
        }

        // ============================================
        // START
        // ============================================

        updateSongs();
        updateGoal();
        setInterval(updateSongs, 10000);
        setInterval(updateGoal, 30000);

    </script>

</body>
</html>
